{% extends 'base.html' %}
{% block title %}Edit Produk{% endblock %}
{% block page_title %}Edit Produk{% endblock %}

{% block content %}
<div style="max-width:600px;">
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Nama Produk</label>
        <input type="text" name="name" required value="{{ prod.name }}">
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>SKU</label>
          <input type="text" name="sku" value="{{ prod.sku or '' }}">
        </div>
        <div class="form-group">
          <label>Kategori</label>
          <input type="text" name="category" value="{{ prod.category or '' }}">
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Harga (Rp)</label>
          <input type="number" name="price" required value="{{ prod.price }}" min="0">
        </div>
        <div class="form-group">
          <label>Stok</label>
          <input type="number" name="stock" required value="{{ prod.stock }}" min="0">
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="submit" class="btn btn-primary">Update Produk</button>
        <a href="{{ url_for('products') }}" class="btn btn-secondary">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
