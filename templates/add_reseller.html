{% extends 'base.html' %}
{% block title %}Tambah Reseller{% endblock %}
{% block page_title %}Tambah Reseller{% endblock %}
{% block content %}
<div style="max-width:560px;">
  <div class="form-card">
    <div class="form-card-header"><h2>Reseller Baru</h2></div>
    <div class="form-card-body">
      <form method="POST" id="reseller-form" data-confirm="Tambahkan reseller baru?" data-confirm-title="Tambah Reseller" data-confirm-icon="🤝" data-confirm-label="Ya, Tambah">
        {% if session.role == 'admin' %}
        <div class="form-group">
          <label class="form-label">Distributor <span class="req">*</span></label>
          <select class="form-control" name="distributor_id" required>
            <option value="">-- Pilih Distributor --</option>
            {% for d in distributors %}
            <option value="{{ d.id }}">{{ d.company }}</option>
            {% endfor %}
          </select>
        </div>
        <hr class="divider">
        {% endif %}
        <div class="form-group">
          <label class="form-label">Nama Reseller <span class="req">*</span></label>
          <input class="form-control" type="text" name="name" required placeholder="Nama lengkap">
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Nomor HP</label>
            <input class="form-control" type="text" name="phone" placeholder="08xxxxxxxxxx">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" placeholder="reseller@email.com">
          </div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Area / Wilayah</label>
            <input class="form-control" type="text" name="area" placeholder="Bandung Selatan">
          </div>
          <div class="form-group">
            <label class="form-label">Komisi (%)</label>
            <input class="form-control" type="number" name="commission_pct" value="5" min="0" max="100" step="0.5">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Alamat</label>
          <textarea class="form-control" name="address" rows="2" placeholder="Opsional..."></textarea>
        </div>
      </form>
    </div>
    <div class="form-card-footer">
      <button type="submit" form="reseller-form" class="btn btn-primary">Simpan Reseller</button>
      <a href="{{ url_for('resellers') }}" class="btn btn-outline">Batal</a>
    </div>
  </div>
</div>
{% endblock %}
